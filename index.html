/* ── GOOGLE AUTH (No Middleman) ── */
async function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  // Scope required for Gemini API access via user account
  provider.addScope('https://www.googleapis.com/auth/generative-language'); 
  try {
    const result = await auth.signInWithPopup(provider);
    showToast("Logged in as " + result.user.displayName);
    showPage('feed');
  } catch (e) {
    console.error("Auth failed", e);
    showToast("Google Sign-In failed.");
  }
}

/* ── GEMINI API CALL (Using User Token) ── */
async function callGemini(prompt, maxTokens) {
  const user = auth.currentUser;
  if (!user) return null;

  try {
    // Get the Access Token directly from the user's Google session 
    const token = await user.getIdToken(); 
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent",
      {
        method: "POST",
        headers: { 
          "Authorization": "Bearer " + token, 
          "Content-Type": "application/json" 
        },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: maxTokens || 1000, temperature: 0.7 }
        })
      }
    );
    const data = await res.json();
    return data.candidates[0].content.parts[0].text.trim(); [cite: 17]
  } catch(e) {
    console.error("Gemini failed", e);
    return null;
  }
}
